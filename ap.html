<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KLH เจ้าหนี้การค้า (AP)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
<style id="klh-swal">
.swal2-popup{border-radius:28px!important;background:rgba(255,255,255,.97)!important;backdrop-filter:blur(8px);box-shadow:0 18px 55px rgba(60,40,25,.22)!important;}
.swal2-styled{border-radius:999px!important;font-weight:700!important;box-shadow:none!important;padding:10px 26px!important;}
.swal2-input,.swal2-textarea,.swal2-select{border-radius:14px!important;}
</style>
<style>
:root{--blue:#3A37C9;--coral:#F6704C;--coral2:#E2502B;--red:#D9512B;--green:#2E7D46;--dark:#3A332C;--line:#ECE6DA;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:linear-gradient(157deg,#F4EEE2,#EFE6D7);min-height:100vh;font-family:"IBM Plex Sans Thai","IBM Plex Sans",'Segoe UI',sans-serif;font-size:14px;color:var(--dark);}
.num{font-variant-numeric:tabular-nums;}
.hdr{background:linear-gradient(120deg,#3A37C9,#2A2799);color:#fff;padding:11px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.hdr h1{font-size:1.05rem;font-weight:700;flex:1;}
.btn-hdr{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:9px;padding:6px 12px;cursor:pointer;font-size:.85rem;}
.tab-nav{background:#fff;border-bottom:2px solid #e0e0e0;display:flex;}
.tab-btn{padding:11px 20px;border:none;background:none;font-size:.9rem;cursor:pointer;color:#666;border-bottom:3px solid transparent;font-weight:600;}
.tab-btn.active{color:var(--coral2);border-bottom-color:var(--coral);background:#FCE6DC;}
.panel{display:none;padding:16px;} .panel.active{display:block;}
.stat-strip{display:flex;gap:16px;padding:14px 16px;background:#fff;border-bottom:1px solid #eee;flex-wrap:wrap;}
.stat-item .val{font-size:1.2rem;font-weight:800;} .stat-item .lbl{font-size:.75rem;color:#888;}
.toolbar{display:flex;gap:10px;margin-bottom:12px;}
.search-box{flex:1;padding:8px 12px;border:1px solid #ddd;border-radius:10px;font-size:.88rem;outline:none;}
.search-box:focus{border-color:var(--coral);}
.card{background:#fff;border-radius:12px;box-shadow:0 1px 6px rgba(0,0,0,.08);overflow:hidden;}
table{width:100%;border-collapse:collapse;font-size:.86rem;}
thead tr{background:#F8F4EC;color:#6B6258;} thead th{padding:9px 12px;text-align:left;white-space:nowrap;font-size:12px;font-weight:700;border-bottom:1px solid #ECE6DA;}
thead th.r{text-align:right;}
tbody td{padding:8px 12px;border-bottom:1px solid #ECE6DA;vertical-align:middle;} tbody td.r{text-align:right;}
tbody tr:hover{background:#FCE6DC55;}
.due-over{background:#FCE4EC;color:#880E4F;border-radius:10px;padding:1px 7px;font-size:.7rem;font-weight:600;}
.due-today{background:#FFF3E0;color:#E65100;border-radius:10px;padding:1px 7px;font-size:.7rem;font-weight:600;}
.due-soon{background:#FFFDE7;color:#9A7D00;border-radius:10px;padding:1px 7px;font-size:.7rem;font-weight:600;}
.btn-sm{padding:5px 11px;border:none;border-radius:9px;font-size:.78rem;font-weight:700;cursor:pointer;}
.btn-pay{background:#1E7A3A;color:#fff;}
.count-bar{padding:7px 14px;font-size:.78rem;color:#888;background:#fafafa;border-top:1px solid #eee;}
#ov{display:none;position:fixed;inset:0;background:rgba(255,255,255,.85);z-index:9999;align-items:center;justify-content:center;}
.spin{width:40px;height:40px;border:4px solid #eee;border-top-color:var(--coral);border-radius:50%;animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="hdr">
  <i class="bi bi-receipt-cutoff fs-5"></i>
  <h1>เจ้าหนี้การค้า (AP) — คงค้าง · ครบกำหนด · ประวัติจ่าย</h1>
  <button class="btn-hdr" onclick="loadAll()"><i class="bi bi-arrow-clockwise"></i> รีเฟรช</button>
  <button class="btn-hdr" onclick="goHome()"><i class="bi bi-house-door-fill"></i> หลัก</button>
</div>
<div class="stat-strip">
  <div class="stat-item"><div class="val" id="sTotal">฿0</div><div class="lbl">เจ้าหนี้คงค้างรวม</div></div>
  <div class="stat-item"><div class="val" style="color:var(--red)" id="sOver">฿0</div><div class="lbl">เกินกำหนด</div></div>
  <div class="stat-item"><div class="val" id="sCount">0</div><div class="lbl">ราย</div></div>
</div>
<div class="tab-nav">
  <button class="tab-btn active" onclick="tab('out',this)"><i class="bi bi-cash-stack"></i> เจ้าหนี้คงค้าง</button>
  <button class="tab-btn" onclick="tab('hist',this);loadHist()"><i class="bi bi-clock-history"></i> ประวัติจ่าย</button>
</div>

<div id="panel-out" class="panel active">
  <div class="toolbar"><input class="search-box" id="q" placeholder="🔍 ค้นชื่อ/รหัสเจ้าหนี้" oninput="renderOut()"></div>
  <div class="card"><div style="overflow-x:auto"><table>
    <thead><tr><th>รหัส</th><th>ชื่อเจ้าหนี้</th><th class="r">คงค้าง</th><th>บิล</th><th>ครบกำหนดใกล้สุด</th><th>จ่าย</th></tr></thead>
    <tbody id="outBody"><tr><td colspan="6" style="text-align:center;color:#aaa;padding:24px">กำลังโหลด...</td></tr></tbody>
  </table></div><div class="count-bar" id="outBar"></div></div>
</div>

<div id="panel-hist" class="panel">
  <div class="card"><div style="overflow-x:auto"><table>
    <thead><tr><th>วันที่</th><th>เจ้าหนี้</th><th>บิล(AP)</th><th class="r">ยอดจ่าย</th><th>ธนาคาร</th><th>บัญชี</th><th>อ้างอิง</th><th>หมายเหตุ</th></tr></thead>
    <tbody id="histBody"><tr><td colspan="8" style="text-align:center;color:#aaa;padding:24px">—</td></tr></tbody>
  </table></div><div class="count-bar" id="histBar"></div></div>
</div>

<div id="ov"><div class="spin"></div></div>
<script>
var _execUrl='', _payables=[];
function showOv(){document.getElementById('ov').style.display='flex';}
function hideOv(){document.getElementById('ov').style.display='none';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function nf(n){return (Number(n)||0).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2});}
function goHome(){ if(_execUrl) window.top.location.href=_execUrl+'?page=index'; else window.location.href='?page=index'; }
function tab(name,btn){ document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');}); document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');}); document.getElementById('panel-'+name).classList.add('active'); btn.classList.add('active'); }
function dueAlert(s){ if(!s) return ''; var d=new Date(String(s).slice(0,10)+'T00:00:00'); if(isNaN(d)) return ''; var t=new Date();t.setHours(0,0,0,0); var diff=Math.round((d-t)/86400000); if(diff<0) return '<span class="due-over">เกิน '+(-diff)+' วัน</span>'; if(diff===0) return '<span class="due-today">ครบวันนี้</span>'; if(diff<=7) return '<span class="due-soon">อีก '+diff+' วัน</span>'; return ''; }

window.onload=function(){ google.script.run.withSuccessHandler(function(u){_execUrl=u||'';}).withFailureHandler(function(){}).getExecUrl(); loadAll(); };
function loadAll(){
  showOv();
  google.script.run.withSuccessHandler(function(r){ hideOv();
    if(!r||!r.ok){ document.getElementById('outBody').innerHTML='<tr><td colspan="6" style="text-align:center;color:#c00;padding:20px">'+((r&&r.msg)||'ผิดพลาด')+'</td></tr>'; return; }
    _payables=r.items||[];
    document.getElementById('sTotal').textContent='฿'+nf(r.total);
    document.getElementById('sOver').textContent='฿'+nf(r.overdue);
    document.getElementById('sCount').textContent=r.count||0;
    renderOut();
  }).withFailureHandler(function(e){ hideOv(); Swal.fire('Error',''+e,'error'); }).apGetPayables();
}
function renderOut(){
  var ql=(document.getElementById('q').value||'').toLowerCase();
  var rows=_payables.filter(function(p){ return !ql || (p.code+p.name).toLowerCase().indexOf(ql)>=0; });
  var tb=document.getElementById('outBody');
  if(!rows.length){ tb.innerHTML='<tr><td colspan="6" style="text-align:center;color:#aaa;padding:24px">ไม่มีเจ้าหนี้คงค้าง</td></tr>'; document.getElementById('outBar').textContent=''; return; }
  tb.innerHTML=rows.map(function(p){
    return '<tr><td><code style="color:var(--blue)">'+esc(p.code)+'</code></td>'
      +'<td style="font-weight:500">'+esc(p.name)+'</td>'
      +'<td class="r" style="color:var(--red);font-weight:700">฿'+nf(p.balance)+'</td>'
      +'<td>'+p.bills+' บิล</td>'
      +'<td>'+esc(p.nearestDue||'—')+' '+dueAlert(p.nearestDue)+'</td>'
      +'<td><button class="btn-sm btn-pay" onclick="openBills(\''+esc(p.code)+'\',\''+esc(p.name)+'\')"><i class="bi bi-cash"></i> ดู/จ่าย</button></td></tr>';
  }).join('');
  document.getElementById('outBar').textContent=rows.length+' ราย';
}
function openBills(code,name){
  showOv();
  google.script.run.withSuccessHandler(function(r){ hideOv();
    if(!r||!r.ok||!(r.items||[]).length){ Swal.fire('แจ้งเตือน','ไม่พบบิลค้างของ '+name,'info'); return; }
    var html='<div style="text-align:left;max-height:60vh;overflow:auto">'
      + r.items.map(function(b){
        return '<div style="border:1px solid #ECE6DA;border-radius:12px;padding:10px;margin-bottom:8px">'
          +'<div style="font-size:12px;color:#888">'+esc(b.apId)+' · บิล '+esc(b.invoiceNo||b.recvNo)+' · ครบ '+esc(b.dueDate)+' '+dueAlert(b.dueDate)+'</div>'
          +'<div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px">'
          +'<span>คงเหลือ <b style="color:var(--red)">฿'+nf(b.balance)+'</b></span>'
          +'<button class="btn-sm btn-pay" onclick="payBill(\''+esc(b.apId)+'\','+b.balance+',\''+esc(name)+'\')">จ่าย</button>'
          +'</div></div>';
      }).join('') + '</div>';
    Swal.fire({ title:'บิลค้าง — '+name, html:html, width:520, confirmButtonText:'ปิด' });
  }).withFailureHandler(function(e){ hideOv(); Swal.fire('Error',''+e,'error'); }).apSupplierBills(code);
}
function payBill(apId, balance, name){
  Swal.fire({
    title:'บันทึกจ่ายเจ้าหนี้', html:esc(name)+' · '+apId+'<br><span style="color:#888">คงเหลือ ฿'+nf(balance)+'</span>'
      +'<input id="pAmt" type="number" class="swal2-input" value="'+Number(balance).toFixed(2)+'" placeholder="จำนวนเงิน">'
      +'<input id="pBank" class="swal2-input" placeholder="ธนาคาร (เช่น กรุงศรีกระแส)">'
      +'<input id="pRef" class="swal2-input" placeholder="อ้างอิง/เลขที่โอน (ถ้ามี)">',
    showCancelButton:true, confirmButtonText:'บันทึกจ่าย', cancelButtonText:'ยกเลิก', confirmButtonColor:'#1E7A3A',
    preConfirm:function(){ var a=Number(document.getElementById('pAmt').value)||0; if(a<=0){ Swal.showValidationMessage('จำนวนเงินไม่ถูกต้อง'); return false; }
      return { amt:a, bank:document.getElementById('pBank').value.trim(), ref:document.getElementById('pRef').value.trim() }; }
  }).then(function(res){
    if(!res.isConfirmed) return; showOv();
    google.script.run.withSuccessHandler(function(r){ hideOv();
      if(r&&r.ok){ Swal.fire({icon:'success',title:r.msg,timer:1800,showConfirmButton:false}); loadAll(); }
      else Swal.fire('Error',(r&&r.msg)||'ไม่สำเร็จ','error');
    }).withFailureHandler(function(e){ hideOv(); Swal.fire('Error',''+e,'error'); }).apPay(apId, res.value.amt, res.value.bank, '', res.value.ref, '');
  });
}
function loadHist(){
  document.getElementById('histBody').innerHTML='<tr><td colspan="8" style="text-align:center;color:#aaa;padding:20px">กำลังโหลด...</td></tr>';
  google.script.run.withSuccessHandler(function(r){
    var items=(r&&r.items)||[]; var tb=document.getElementById('histBody');
    if(!items.length){ tb.innerHTML='<tr><td colspan="8" style="text-align:center;color:#aaa;padding:24px">ยังไม่มีประวัติจ่าย</td></tr>'; document.getElementById('histBar').textContent=''; return; }
    tb.innerHTML=items.map(function(h){
      return '<tr><td>'+esc(h.date)+'</td><td style="font-weight:500">'+esc(h.name)+'</td><td><code style="font-size:.78rem">'+esc(h.apId)+'</code></td>'
        +'<td class="r" style="color:var(--green);font-weight:700">฿'+nf(h.amount)+'</td><td>'+esc(h.bank)+'</td><td>'+esc(h.account)+'</td><td>'+esc(h.ref)+'</td><td>'+esc(h.note)+'</td></tr>';
    }).join('');
    document.getElementById('histBar').textContent=items.length+' รายการ';
  }).withFailureHandler(function(e){ document.getElementById('histBody').innerHTML='<tr><td colspan="8" style="color:#c00;padding:16px">'+e+'</td></tr>'; }).apPayHistory('');
}
</script>
</body>
</html>
