<link rel="stylesheet" href="desktop.css" />

<script type="text/babel">
function App() {
  return (
    <div className="dstage">
      <div className="dstage-head">
        <div style={{ fontFamily: "var(--ff-num)", fontSize: 12, fontWeight: 700, letterSpacing: ".18em", color: "var(--brand-2)" }}>POS · COUNTER / CASHIER</div>
        <h1 style={{ margin: "4px 0 0", fontSize: 31, fontWeight: 700, letterSpacing: "-.01em" }}>หน้าจอแคชเชียร์ — POS PC &amp; Sunmi T2 Lite</h1>
        <p style={{ margin: "8px 0 0", color: "var(--ink-2)", fontSize: 15, maxWidth: 820, lineHeight: 1.55 }}>
          2 รูปแบบเครื่องคิดเงินหน้าร้าน ใช้ดีไซน์/ข้อมูลชุดเดียวกับ Handheld — เลือกสินค้า, <b>พักบิล/เปิดบิลใหม่</b>, สมาชิก,
          และ <b>หน้าชำระเงินแคชเชียร์</b>ที่มี <b>เงินสด + ลิ้นชักเก็บเงิน</b>, <b>QR พร้อมเพย์</b> และบัตร — เตรียมเชื่อมต่อ <b>Tigercashbox</b> (ลิ้นชัก/เครื่องพิมพ์) · กดเล่นได้จริงทั้งสองเครื่อง
        </p>
      </div>

      <div className="dblock">
        <div className="dblock-label" style={{ marginBottom: 18 }}>
          <div className="vn">แบบที่ 1 · DESKTOP</div>
          <div className="vt">POS สำหรับ PC</div>
          <div className="vd">เลย์เอาต์ 3 คอลัมน์สำหรับจอกว้าง + เมาส์ — หมวดหมู่ซ้าย · ตารางสินค้ากลาง · บิลขวา · บิลที่พักไว้แสดงเป็นแท็บด้านบน คลิกสลับได้ทันที</div>
        </div>
        <div style={{ display: "flex", justifyContent: "center" }}><PCPos /></div>
      </div>

      <div className="dblock" style={{ maxWidth: 1340 }}>
        <div className="dblock-label" style={{ marginBottom: 18 }}>
          <div className="vn">แบบที่ 2 · COUNTERTOP</div>
          <div className="vt">Sunmi T2 Lite (2 จอ)</div>
          <div className="vd">เครื่องตั้งเคาน์เตอร์จอสัมผัส ปุ่มใหญ่ขึ้น + <b>จอลูกค้า (Customer Display)</b> แยกอีกจอ โชว์รายการ/ยอด และ <b>QR ให้ลูกค้าสแกนจ่าย</b> ตอนกดชำระเงิน</div>
        </div>
        <div style={{ display: "flex", justifyContent: "center", overflowX: "auto", paddingBottom: 10 }}><SunmiT2 /></div>
      </div>

      <div style={{ maxWidth: 820, margin: "0 auto", padding: "18px 20px", borderRadius: 14, background: "var(--surface)", border: "1px solid var(--line)", color: "var(--ink-2)", fontSize: 13.5, lineHeight: 1.6 }}>
        <b style={{ color: "var(--ink)" }}>ลองเล่น:</b> กดสินค้าเพื่อเพิ่มลงบิล → <b>พักบิล</b> (ปุ่มในแผงขวา) แล้วกด <b>＋ บิลใหม่</b> เพื่อขายรายการใหม่ → กลับมาคลิกแท็บบิลเดิม (PC) หรือปุ่ม “บิลพัก” (T2) เพื่อเปิดต่อ · กด <b>ชำระเงิน</b> เพื่อเปิดหน้าแคชเชียร์ (เงินสด/คีย์แพด + ลิ้นชัก, QR, บัตร)
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
